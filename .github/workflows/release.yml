name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Check syntax
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Package extension
        run: npx --yes @vscode/vsce package --out "macro-helper-${GITHUB_REF_NAME}.vsix"

      - name: Publish to Visual Studio Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath "macro-helper-${GITHUB_REF_NAME}.vsix"

      - name: Prepare release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 == "## " version { found = 1; next }
            found && /^## / { exit }
            found && NF { print; printed = 1 }
            found && !NF && printed { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "C Macro Helper $GITHUB_REF_NAME"
              echo
              echo "- Release notes pending"
            } > release-notes.md
          fi

      - name: Create GitHub release draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "macro-helper-${GITHUB_REF_NAME}.vsix" \
            --draft \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
